name: StashFin Review Bot

on:
  schedule:
    - cron: '30 3 * * 1'   # Every Monday 9:00am IST (3:30am UTC)
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run review bot
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_ALL:          ${{ secrets.EMAIL_ALL }}
        run: python main.py

      - name: Save history and publish detail page
        run: |
          git config user.name  "stashfin-review-bot"
          git config user.email "bot@stashfin.com"
          git add history.json last_run.json index.html || true
          git diff --staged --quiet || git commit -m "chore: weekly run $(date +%Y-%m-%d) [skip ci]"
          git push || true
